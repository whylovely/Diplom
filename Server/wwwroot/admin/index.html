<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Finance Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');

        :root {
            --bg: #080C1A;
            --surface: #0A0E1E;
            --surface-card: rgba(17, 21, 40, 0.69);
            --surface2: #0D1120;
            --primary-start: #29B6F6;
            --primary-end: #AA00FF;
            --primary-hover: #1E88C8;
            --danger: #FF5252;
            --danger-hover: #D32F2F;
            --success: #00E676;
            --warning: #ffa502;
            --text: #D8D8D8;
            --text-dim: #9E9E9E;
            --border: #222845;
            --radius: 12px;
            --font-ui: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
            --font-mono: 'Fira Code', Consolas, monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-ui);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
        }

        .login-card {
            background: var(--surface-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 380px;
            transition: box-shadow 0.3s;
        }

        .login-card:hover {
            box-shadow: 0 4px 20px 0 rgba(41, 182, 246, 0.1);
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: .5rem;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary-start), var(--primary-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card p {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            font-size: .9rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: .35rem;
            font-size: .85rem;
            color: var(--text-dim);
        }

        .form-group input {
            width: 100%;
            padding: .7rem 1rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: .95rem;
            outline: none;
            transition: border-color .2s;
        }

        .form-group input:focus {
            border-color: var(--primary-hover);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: .65rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-size: .9rem;
            font-family: var(--font-ui);
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-start), var(--primary-end));
            color: #fff;
            width: 100%;
            box-shadow: none;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 20px 0 rgba(41, 182, 246, 0.2);
            background: linear-gradient(135deg, #4FC3F7, #CE93D8);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
            padding: .45rem .8rem;
            font-size: .8rem;
        }

        .btn-danger:hover {
            background: var(--danger-hover);
        }

        .btn-success {
            background: var(--success);
            color: #111;
            padding: .45rem .8rem;
            font-size: .8rem;
        }

        .btn-warning {
            background: var(--warning);
            color: #111;
            padding: .45rem .8rem;
            font-size: .8rem;
        }

        .btn-sm {
            padding: .4rem .7rem;
            font-size: .78rem;
        }

        .error-msg {
            color: var(--danger);
            font-size: .85rem;
            text-align: center;
            margin-top: .75rem;
            min-height: 1.2rem;
        }

        #dashboard {
            display: none;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .topbar h2 {
            font-size: 1.15rem;
            background: linear-gradient(135deg, var(--primary-start), var(--primary-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .topbar-right span {
            color: var(--text-dim);
            font-size: .85rem;
        }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.25rem;
            transition: box-shadow 0.3s;
        }

        .stat-card:hover {
            box-shadow: 0 4px 15px 0 rgba(41, 182, 246, 0.1);
        }

        .stat-card .label {
            font-size: .8rem;
            color: var(--text-dim);
            margin-bottom: .3rem;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            font-family: var(--font-mono);
            font-variant-numeric: tabular-nums slashed-zero;
        }

        .card {
            background: var(--surface-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: box-shadow 0.3s;
        }

        .card:hover {
            box-shadow: 0 4px 20px 0 rgba(41, 182, 246, 0.1);
        }

        .card-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: .95rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
        }

        th,
        td {
            padding: .75rem 1rem;
            text-align: left;
        }

        td {
            font-family: var(--font-mono);
            font-variant-numeric: tabular-nums slashed-zero;
        }

        th {
            font-size: .78rem;
            font-family: var(--font-ui);
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-dim);
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        tr:not(:last-child) td {
            border-bottom: 1px solid var(--border);
        }

        tr:hover td {
            background: rgba(30, 136, 200, .1);
        }

        .badge {
            display: inline-block;
            padding: .2rem .55rem;
            border-radius: 6px;
            font-size: .75rem;
            font-family: var(--font-ui);
            font-weight: 600;
        }

        .badge-admin {
            background: rgba(170, 0, 255, .15);
            color: var(--primary-end);
        }

        .badge-user {
            background: rgba(139, 141, 154, .12);
            color: var(--text-dim);
        }

        .badge-blocked {
            background: rgba(255, 71, 87, .15);
            color: var(--danger);
        }

        .badge-active {
            background: rgba(46, 213, 115, .15);
            color: var(--success);
        }

        .actions {
            display: flex;
            gap: .4rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
        }

        /* Skeleton Loading */
        .skeleton {
            background: #151A2E;
            border-radius: 4px;
            height: 40px;
            margin-bottom: 8px;
            animation: pulse-bg 1.5s infinite;
        }

        @keyframes pulse-bg {
            0% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                opacity: 0.3;
            }
        }

        .skeleton-container {
            padding: 1.25rem;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            color: var(--text-dim);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            fill: #9E9E9E;
            opacity: 0.15;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 .75rem;
            }

            th,
            td {
                padding: .5rem .6rem;
                font-size: .85rem;
            }
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>🛡️ Admin Panel</h1>
            <p>Finance Tracker — Панель администратора</p>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="admin@finance.local" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn btn-primary" id="login-btn">Войти</button>
            <div class="error-msg" id="login-error"></div>
        </div>
    </div>

    <div id="dashboard">
        <div class="topbar">
            <h2>🛡️ Admin Panel</h2>
            <div class="topbar-right">
                <span id="admin-email"></span>
                <button class="btn btn-sm btn-danger" onclick="logout()">Выход</button>
            </div>
        </div>

        <div class="container">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="label">Всего пользователей</div>
                    <div class="value" id="stat-total">—</div>
                </div>
                <div class="stat-card">
                    <div class="label">Активных</div>
                    <div class="value" id="stat-active">—</div>
                </div>
                <div class="stat-card">
                    <div class="label">Заблокированных</div>
                    <div class="value" id="stat-blocked">—</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Пользователи</div>
                <div id="users-table-wrap">
                    <div class="skeleton-container">
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let token = localStorage.getItem('admin_token');

        if (token) {
            showDashboard();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }

        document.getElementById('login-btn').addEventListener('click', login);
        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('login-error');
            errEl.textContent = '';

            try {
                const res = await fetch(`${API}/api/auth/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!res.ok) {
                    const text = await res.text();
                    errEl.textContent = res.status === 403 ? 'Нет прав администратора' : text || 'Неверные данные';
                    return;
                }

                const data = await res.json();
                token = data.accessToken;
                localStorage.setItem('admin_token', token);
                showDashboard();
            } catch (e) {
                errEl.textContent = 'Ошибка подключения к серверу';
            }
        }

        function logout() {
            token = null;
            localStorage.removeItem('admin_token');
            location.reload();
        }

        async function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                document.getElementById('admin-email').textContent = payload.email || '';
            } catch { }

            await loadUsers();
        }

        async function apiFetch(path, options = {}) {
            const res = await fetch(`${API}${path}`, {
                ...options,
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(options.headers || {}) }
            });

            if (res.status === 401 || res.status === 403) { logout(); return null; }
            return res;
        }

        async function loadUsers() {
            const wrap = document.getElementById('users-table-wrap');
            wrap.innerHTML = '<div class="skeleton-container"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>';

            const res = await apiFetch('/api/admin/users');
            if (!res) return;
            const users = await res.json();

            document.getElementById('stat-total').textContent = users.length;
            document.getElementById('stat-active').textContent = users.filter(u => !u.isBlocked).length;
            document.getElementById('stat-blocked').textContent = users.filter(u => u.isBlocked).length;

            if (users.length === 0) {
                wrap.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                        <div>Пользователей нет</div>
                    </div>
                `;
                return;
            }

            let html = `<table>
        <thead><tr>
            <th>Email</th><th>Роль</th><th>Статус</th><th>Счетов</th><th>Транзакций</th><th>Создан</th><th>Действия</th>
        </tr></thead><tbody>`;

            for (const u of users) {
                const roleBadge = u.role === 'Admin'
                    ? '<span class="badge badge-admin">Admin</span>'
                    : '<span class="badge badge-user">User</span>';

                const statusBadge = u.isBlocked
                    ? '<span class="badge badge-blocked">Заблокирован</span>'
                    : '<span class="badge badge-active">Активен</span>';

                const date = new Date(u.createdAt).toLocaleDateString('ru-RU');

                let actions = '';
                if (u.role !== 'Admin') {
                    if (u.isBlocked) {
                        actions += `<button class="btn btn-sm btn-success" onclick="unblock('${u.id}')">Разблокировать</button>`;
                    } else {
                        actions += `<button class="btn btn-sm btn-warning" onclick="block('${u.id}')">Заблокировать</button>`;
                    }
                    actions += ` <button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}','${u.email}')">Удалить</button>`;
                } else {
                    actions = '<span style="color:var(--text-dim);font-size:.8rem">—</span>';
                }

                html += `<tr>
            <td>${u.email}</td>
            <td>${roleBadge}</td>
            <td>${statusBadge}</td>
            <td>${u.accountsCount}</td>
            <td>${u.transactionsCount}</td>
            <td>${date}</td>
            <td class="actions">${actions}</td>
        </tr>`;
            }

            html += '</tbody></table>';
            wrap.innerHTML = html;
        }

        async function block(id) {
            await apiFetch(`/api/admin/users/${id}/block`, { method: 'PUT' });
            await loadUsers();
        }

        async function unblock(id) {
            await apiFetch(`/api/admin/users/${id}/unblock`, { method: 'PUT' });
            await loadUsers();
        }

        async function deleteUser(id, email) {
            if (!confirm(`Удалить пользователя ${email} и все его данные?`)) return;
            await apiFetch(`/api/admin/users/${id}`, { method: 'DELETE' });
            await loadUsers();
        }
    </script>
</body>

</html>
